<!-- Use the style attribute for styling HTML elements
Use background-color for background color
Use color for text colors
Use font-family for text fonts
Use font-size for text sizes
Use text-align for text alignment -->
<!DOCTYPE html>
<html>
    <body>
        <p>I am a Normal</p>
        <p style="color: red;">I am red</p>
        <p style="color: blue;">I am blue</p>
        <p style="font-size: 20px;">I am a big</p>
    </body>
    <!-- using style attribute we can change the color and font size of the text -->
    <body style="background-color: rgb(14, 13, 13); color: white;">
        <h1 style="color: yellow;"> This is a Heading</h1>
        <p style="color: rgb(36, 170, 76);">This is a pragraph</p>
    </body>
    <!-- Fonts can be changed using the font-family property in the style attribute -->
     <body>
        <h1 style="font-family:verdana;"> This is a Heading</h1>
        <p style="font-family:Courier;">This is a pragraph</p>
     </body>
     <!-- Text size can be changed using the font-size property in the style attribute -->
      <body>
        <h1 style="font-size:300%;">This is a heading</h1>
        <p style="font-size:160%;">This is a paragraph.</p>
      </body>
      <!-- Text alignment can be changed using the text-align property in the style attribute -->
       <body>
        <h1 style="text-align: center;">This is a heading</h1>
        <p style="text-align: right;">This is a paragraph.</p>
       </body>
</html>
